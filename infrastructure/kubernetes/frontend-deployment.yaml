apiVersion: apps/v1
kind: Deployment
metadata:
  name: pitlane-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pitlane-frontend
  template:
    metadata:
      labels:
        app: pitlane-frontend
    spec:
      containers:
      - name: pitlane-frontend
        image: gcr.io/pitlane-fantasy/pitlane-frontend:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: pitlane-frontend-service
spec:
  type: LoadBalancer
  selector:
    app: pitlane-frontend
  ports:
  - port: 80
    targetPort: 80
